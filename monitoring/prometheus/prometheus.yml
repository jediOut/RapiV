global:
  scrape_interval: 10s
  evaluation_interval: 10s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets:
          - prometheus:9090

  - job_name: rapiv-backend-local
    metrics_path: /api/metrics
    static_configs:
      - targets:
          - host.docker.internal:3000
