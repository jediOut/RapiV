name: Deploy staging-lite

on:
  workflow_dispatch:
    inputs:
      use_domain:
        description: "Start Caddy/HTTPS for a real staging domain"
        required: true
        default: false
        type: boolean

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Package repository
        run: |
          tar \
            --exclude='.git' \
            --exclude='node_modules' \
            --exclude='*/node_modules' \
            --exclude='.expo' \
            --exclude='*/.expo' \
            --exclude='deploy/staging.env' \
            --exclude='**/.terraform' \
            --exclude='**/.terraform.lock.hcl' \
            --exclude='**/terraform.tfstate' \
            --exclude='**/terraform.tfstate.*' \
            --exclude='**/terraform.tfvars' \
            -czf /tmp/rapiv-staging.tar.gz .

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: us-east-1
          role-to-assume: ${{ secrets.STAGING_AWS_ROLE_ARN }}

      - name: Upload deploy artifacts
        id: upload
        env:
          STAGING_DEPLOY_BUCKET: ${{ secrets.STAGING_DEPLOY_BUCKET }}
          STAGING_ENV_FILE: ${{ secrets.STAGING_ENV_FILE }}
        run: |
          set -euo pipefail
          RELEASE_KEY="releases/${GITHUB_RUN_ID}-${GITHUB_SHA}.tar.gz"
          ENV_KEY="releases/${GITHUB_RUN_ID}-${GITHUB_SHA}.env"
          printf '%s\n' "$STAGING_ENV_FILE" > /tmp/staging.env
          aws s3 cp /tmp/rapiv-staging.tar.gz "s3://${STAGING_DEPLOY_BUCKET}/${RELEASE_KEY}" --sse AES256
          aws s3 cp /tmp/staging.env "s3://${STAGING_DEPLOY_BUCKET}/${ENV_KEY}" --sse AES256
          echo "release_key=${RELEASE_KEY}" >> "$GITHUB_OUTPUT"
          echo "env_key=${ENV_KEY}" >> "$GITHUB_OUTPUT"

      - name: Deploy on EC2 through SSM
        env:
          STAGING_DEPLOY_BUCKET: ${{ secrets.STAGING_DEPLOY_BUCKET }}
          STAGING_INSTANCE_ID: ${{ secrets.STAGING_INSTANCE_ID }}
          RELEASE_KEY: ${{ steps.upload.outputs.release_key }}
          ENV_KEY: ${{ steps.upload.outputs.env_key }}
          USE_DOMAIN: ${{ inputs.use_domain }}
        run: |
          set -euo pipefail
          PARAMS=$(jq -n \
            --arg bucket "$STAGING_DEPLOY_BUCKET" \
            --arg release_key "$RELEASE_KEY" \
            --arg env_key "$ENV_KEY" \
            --arg use_domain "$USE_DOMAIN" \
            '{commands: [
              "set -euo pipefail",
              "if ! command -v aws >/dev/null 2>&1; then apt-get update && apt-get install -y awscli; fi",
              "mkdir -p /opt/rapiv/deploy",
              "aws s3 cp \"s3://\($bucket)/\($release_key)\" /tmp/rapiv-staging.tar.gz",
              "aws s3 cp \"s3://\($bucket)/\($env_key)\" /tmp/staging.env",
              "tar -xzf /tmp/rapiv-staging.tar.gz -C /opt/rapiv",
              "install -m 600 /tmp/staging.env /opt/rapiv/deploy/staging.env",
              "cd /opt/rapiv",
              "if [ \"\($use_domain)\" = \"true\" ]; then COMPOSE_FILES=\"-f docker-compose.staging.yml\"; SERVICES=\"backend caddy\"; else COMPOSE_FILES=\"-f docker-compose.staging.yml -f docker-compose.staging-ip.yml\"; SERVICES=\"backend\"; fi",
              "docker compose $COMPOSE_FILES build backend migrate",
              "docker compose $COMPOSE_FILES --profile tools run --rm migrate",
              "docker compose $COMPOSE_FILES up -d $SERVICES",
              "docker image prune -f",
              "rm -f /tmp/rapiv-staging.tar.gz /tmp/staging.env",
              "chown -R ubuntu:ubuntu /opt/rapiv"
            ]}')
          COMMAND_ID=$(aws ssm send-command \
            --document-name AWS-RunShellScript \
            --instance-ids "$STAGING_INSTANCE_ID" \
            --comment "Deploy RapiV staging ${GITHUB_SHA}" \
            --parameters "$PARAMS" \
            --query 'Command.CommandId' \
            --output text)
          aws ssm wait command-executed --command-id "$COMMAND_ID" --instance-id "$STAGING_INSTANCE_ID"
          aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "$STAGING_INSTANCE_ID" \
            --query '{Status:Status,ResponseCode:ResponseCode,StandardOutputContent:StandardOutputContent,StandardErrorContent:StandardErrorContent}' \
            --output json

      - name: Remove deploy artifacts
        if: always() && steps.upload.outputs.release_key != ''
        env:
          STAGING_DEPLOY_BUCKET: ${{ secrets.STAGING_DEPLOY_BUCKET }}
          RELEASE_KEY: ${{ steps.upload.outputs.release_key }}
          ENV_KEY: ${{ steps.upload.outputs.env_key }}
        run: |
          aws s3 rm "s3://${STAGING_DEPLOY_BUCKET}/${RELEASE_KEY}" || true
          aws s3 rm "s3://${STAGING_DEPLOY_BUCKET}/${ENV_KEY}" || true
